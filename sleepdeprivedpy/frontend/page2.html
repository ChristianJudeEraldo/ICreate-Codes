<div id="page2" class="invisible">
    <div class="banner1">
        <img src="assets/img/logo.png" class="logo" alt="Logo" />
        <div class="project">Sleep Deprivation Detection System</div>
    </div>

    <div class="abs t15 l0 w100 h85">
        <div class="abs t0 l0 w100 h100 flex-x jy-space-evenly an-center">
            <!-- Left: Result Card -->
            <div class="card w46 h85 flex-y jy-start an-center">
                <div class="page2-card-title">
                    Scan Result for:
                    <span id="page2-student-id" class="page2-student-id">2022-2-01849</span>
                </div>

                <div class="page2-photo-frame">
                    <img
                        id="page2-face"
                        src="assets/img/video.png?x=1"
                        alt="Captured face"
                        class="page2-photo"
                    />
                </div>

                <div class="page2-result-row">
                    <i id="page2-warn-icon" class="fa-solid fa-triangle-exclamation page2-warn-icon"></i>
                    <div id="page2-result" class="page2-result-text">Sleep Deprived</div>
                </div>

                <div class="page2-confidence">
                    Confidence:
                    <span id="page2-confidence">93%</span>
                </div>
            </div>

            <!-- Right: Web Report Card -->
            <div class="card w46 h85 flex-y jy-start an-center">
                <div class="page2-card-title">View Web Report</div>
                <div class="page2-desc">
                    Scan this QR code to log in to your student dashboard and view your report in the website.
                </div>

                <div class="page2-qr-frame">
                    <img id="page2-qr" src="assets/img/qr.png" alt="QR Code" class="page2-qr" />
                </div>

                <button type="button" class="page2-btn" onclick="onScanNextStudent()">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span>Scan Next Student</span>
                </button>
            </div>
        </div>
    </div>
</div>
